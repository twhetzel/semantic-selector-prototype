# Demo index sources (pyoxigraph) — local files in data/input/
# Download: bash scripts/download_obo_foundry_ontologies.sh

index:
  output_path: "data/indexes/selector-index.sqlite"
  snapshot_id: "demo-pyoxigraph-002"

build:
  rdf_backend: "pyoxigraph"
  temporary_store_dir: "data/tmp/rdf-store"
  retain_rdf_store_after_build: true
  instrumentation_enabled: true

sources:
  - artifact_id: "obo:mondo"
    name: "Mondo Disease Ontology"
    source_type: "local_file"
    path: "data/input/mondo.owl"
    repository_id: "obo-foundry"
    declared_version: null
    access_scope: "public"

  - artifact_id: "obo:doid"
    name: "Human Disease Ontology"
    source_type: "local_file"
    path: "data/input/doid.owl"
    repository_id: "obo-foundry"
    declared_version: null
    access_scope: "public"

  - artifact_id: "obo:hp"
    name: "Human Phenotype Ontology"
    source_type: "local_file"
    path: "data/input/hp.owl"
    repository_id: "obo-foundry"
    declared_version: null
    access_scope: "public"

  - artifact_id: "obo:go"
    name: "Gene Ontology"
    source_type: "local_file"
    path: "data/input/go.owl"
    repository_id: "obo-foundry"
    declared_version: null
    access_scope: "public"

  - artifact_id: "obo:obi"
    name: "Ontology for Biomedical Investigations"
    source_type: "local_file"
    path: "data/input/obi.owl"
    repository_id: "obo-foundry"
    declared_version: null
    access_scope: "public"

  - artifact_id: "obo:efo"
    name: "Experimental Factor Ontology"
    source_type: "local_file"
    path: "data/input/efo.owl"
    repository_id: "obo-foundry"
    declared_version: null
    access_scope: "public"

  - artifact_id: "obo:ncit"
    name: "NCI Thesaurus"
    source_type: "local_file"
    path: "data/input/ncit.owl"
    repository_id: "obo-foundry"
    declared_version: null
    access_scope: "public"
